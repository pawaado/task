<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>タスク管理</title>
<style>
:root{--green:#2f9e44;--green2:#237a34;--yellow:#d4a514;--yellow2:#a97f00;--red:#d64545;--red2:#a92f2f;--bg:#eef3ef;--text:#172033;--muted:#6b7280}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:10;background:#fff;padding:14px 14px 10px;box-shadow:0 2px 10px #00000014}
h1{font-size:22px;margin:0 0 10px}.tabs{display:flex;gap:8px}
.tab{flex:1;border:0;border-radius:10px;padding:11px 8px;font-size:15px;font-weight:800;background:#e5e7eb;color:#374151}
.tab.active{background:#111827;color:#fff}
main{padding:14px 14px 90px}.panel{display:none}.panel.active{display:block}
.form{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px #00000014;margin-bottom:14px}
h2{font-size:23px;margin:4px 0 18px}
label{display:block;font-size:14px;font-weight:800;margin:11px 0 6px}
input,select,textarea{width:100%;padding:12px;border:1px solid #cfd5dc;border-radius:10px;font-size:16px;background:#fff}
textarea{min-height:95px;resize:vertical}
.primary{width:100%;margin-top:14px;border:0;border-radius:11px;padding:14px;font-size:17px;font-weight:900;background:#111827;color:#fff}
.task-list{display:flex;flex-direction:column;gap:10px}.task-wrap{position:relative;overflow:hidden;border-radius:14px}
.delete-bg{position:absolute;inset:0 0 0 auto;width:96px;display:flex;align-items:center;justify-content:center;background:#991b1b;color:#fff;font-weight:900}
.task-card{position:relative;z-index:2;width:100%;border:0;text-align:left;color:#fff;padding:17px 16px;border-radius:14px;transition:transform .18s;box-shadow:0 3px 10px #0000001f}
.task-card.green{background:linear-gradient(135deg,var(--green),var(--green2))}
.task-card.yellow{background:linear-gradient(135deg,var(--yellow),var(--yellow2))}
.task-card.red{background:linear-gradient(135deg,var(--red),var(--red2))}
.task-title{font-size:20px;font-weight:900;line-height:1.35}.task-meta{font-size:18px;font-weight:700;opacity:.98;margin-top:8px}
.detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #ffffff59;font-size:15px;line-height:1.65}
.task-card.open .detail{display:block}.task-note{white-space:pre-wrap;word-break:break-word}
.actions{display:flex;gap:8px;margin-top:10px}.small-btn{flex:1;border:0;border-radius:9px;padding:10px;font-weight:900;font-size:15px}
.complete{background:#fff;color:#111827}.edit{background:#ffffff38;color:#fff}
.badge{display:inline-block;margin-left:7px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:900;background:#ffffff40}
.empty{background:#fff;border-radius:14px;padding:25px;text-align:center;color:var(--muted)}
.repeat-item{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px #00000012}
.repeat-title{font-weight:900;font-size:17px}.repeat-meta{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.6}
.repeat-note{font-size:14px;margin-top:8px;white-space:pre-wrap;word-break:break-word}
.repeat-actions{display:flex;gap:8px;margin-top:11px}.repeat-actions button{flex:1;border:0;border-radius:8px;padding:10px;font-weight:800}
.secondary{background:#e5e7eb;color:#111827}.danger{background:#fee2e2;color:#991b1b}
.hidden{display:none}
.modal-backdrop{display:none;position:fixed;inset:0;z-index:50;background:#00000073;align-items:flex-end;justify-content:center}
.modal-backdrop.show{display:flex}.modal{width:100%;max-width:600px;background:#fff;border-radius:18px 18px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -5px 24px #0003}
.modal h3{font-size:21px;margin:0 0 14px}.modal-actions{display:flex;gap:9px;margin-top:15px}
.modal-actions button{flex:1;border:0;border-radius:10px;padding:13px;font-weight:900}.cancel{background:#e5e7eb}.save-btn{background:#111827;color:#fff}

.date-field{cursor:pointer}
.calendar-backdrop{
  display:none;position:fixed;inset:0;z-index:80;background:#00000073;
  align-items:center;justify-content:center;padding:18px
}
.calendar-backdrop.show{display:flex}
.calendar-box{
  width:100%;max-width:420px;background:#fff;border-radius:20px;
  padding:18px;box-shadow:0 10px 35px #0004
}
.calendar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.calendar-title{font-size:20px;font-weight:900}
.calendar-nav{
  width:46px;height:46px;border:0;border-radius:12px;background:#f3f4f6;
  font-size:28px;font-weight:700;line-height:1
}
.calendar-weekdays,.calendar-days{
  display:grid;grid-template-columns:repeat(7,1fr);gap:5px
}
.calendar-weekdays div{
  text-align:center;font-size:13px;font-weight:800;color:#6b7280;padding:5px 0
}
.calendar-day{
  aspect-ratio:1;border:0;border-radius:50%;background:transparent;
  font-size:17px;font-weight:700;color:#111827
}
.calendar-day.other{color:#c3c7ce}
.calendar-day.today{outline:2px solid #93c5fd}
.calendar-day.selected{background:#2563eb;color:#fff;outline:none}
.calendar-footer{display:flex;gap:10px;margin-top:16px}
.calendar-footer button{
  flex:1;border:0;border-radius:12px;padding:13px;font-size:16px;font-weight:900
}
.calendar-reset{background:#f3f4f6;color:#111827}
.calendar-ok{background:#2563eb;color:#fff}


.photo-add-btn{width:100%;border:1px dashed #9ca3af;border-radius:11px;padding:13px;background:#fff;color:#111827;font-size:15px;font-weight:900;margin-top:8px}
.photo-editor-grid,.task-photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.photo-editor-item,.task-photo-item{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:#e5e7eb}
.photo-editor-item img,.task-photo-item img{width:100%;height:100%;object-fit:cover;display:block}
.photo-remove{position:absolute;right:4px;top:4px;width:27px;height:27px;border:0;border-radius:50%;background:#111827;color:#fff;font-size:18px;font-weight:900;line-height:25px;padding:0}
.photo-count{display:inline-flex;align-items:center;justify-content:center;margin-left:7px;min-width:30px;height:24px;padding:0 7px;border-radius:999px;background:#ffffffd9;color:#111827;font-size:12px;font-weight:900;vertical-align:middle}
.task-photos-title{font-weight:900;margin:12px 0 6px}
.photo-viewer{display:none;position:fixed;inset:0;z-index:120;background:#000e;align-items:center;justify-content:center;padding:18px}
.photo-viewer.show{display:flex}.photo-viewer img{max-width:100%;max-height:88vh;border-radius:12px;object-fit:contain}
.photo-viewer-close{position:absolute;right:18px;top:calc(18px + env(safe-area-inset-top));width:44px;height:44px;border:0;border-radius:50%;background:#fff;color:#111827;font-size:28px;font-weight:900}
.photo-help{font-size:12px;color:#6b7280;margin-top:6px}

</style>
</head>
<body>
<header><h1>タスク管理</h1><div class="tabs">
<button class="tab active" data-tab="tasks">タスク</button>
<button class="tab" data-tab="add">追加</button>
<button class="tab" data-tab="repeat">週例・月例</button>
</div></header>

<main>
<section id="tasks" class="panel active"><div id="taskList" class="task-list"></div></section>

<section id="add" class="panel"><div class="form">
<h2>通常タスクを追加</h2>
<label>タスク名</label><input id="titleInput" placeholder="例：水質検査結果の確認">
<label>期限</label><input id="dueInput" class="date-field" type="text" readonly placeholder="期限を選択">
<label>補足説明</label><textarea id="noteInput" placeholder="作業内容や注意点など"></textarea>
<label>写真</label>
<div id="addPhotoPreview" class="photo-editor-grid"></div>
<input id="addPhotoInput" type="file" accept="image/*" multiple hidden>
<button id="addPhotoBtn" class="photo-add-btn" type="button">＋ 写真を追加（最大5枚）</button>
<div class="photo-help">写真は端末内で縮小して保存します。</div>
<button class="primary" id="addTaskBtn">追加する</button>
</div></section>

<section id="repeat" class="panel"><div class="form">
<h2>週例・月例を登録</h2>
<label>タスク名</label><input id="repeatTitle" placeholder="例：pH計校正">
<label>種類</label>
<select id="repeatType"><option value="weekly">週例</option><option value="monthly">月例</option></select>

<div id="weeklyRule">
<label>出現する曜日</label>
<select id="weeklyDay">
<option value="1">月曜日</option><option value="2">火曜日</option><option value="3">水曜日</option>
<option value="4">木曜日</option><option value="5">金曜日</option>
</select>
</div>

<div id="monthlyRule" class="hidden">
<label>出現ルール</label>
<select id="monthlyMode">
<option value="first_business">毎月1日を基準</option>
<option value="second_monday">第2月曜日</option>
<option value="third_monday">第3月曜日</option>
<option value="day15">毎月15日</option>
<option value="last_business">月末営業日</option>
</select>
</div>

<label>補足説明</label><textarea id="repeatNote" placeholder="作業内容や注意点など"></textarea>
<label>写真</label>
<div id="repeatPhotoPreview" class="photo-editor-grid"></div>
<input id="repeatPhotoInput" type="file" accept="image/*" multiple hidden>
<button id="repeatPhotoBtn" class="photo-add-btn" type="button">＋ 写真を追加（最大5枚）</button>
<div class="photo-help">登録した写真は、自動生成されるタスクへ引き継がれます。</div>
<button class="primary" id="addRepeatBtn">登録する</button>
</div><div id="repeatList"></div></section>
</main>

<div id="editModal" class="modal-backdrop"><div class="modal">
<h3>タスクを編集</h3>
<label>タスク名</label><input id="editTitle">
<label>期限</label><input id="editDue" class="date-field" type="text" readonly placeholder="期限を選択">
<label>補足説明</label><textarea id="editNote"></textarea>
<label>写真</label>
<div id="editPhotoPreview" class="photo-editor-grid"></div>
<input id="editPhotoInput" type="file" accept="image/*" multiple hidden>
<button id="editPhotoBtn" class="photo-add-btn" type="button">＋ 写真を追加（最大5枚）</button>
<div class="modal-actions"><button id="cancelEdit" class="cancel">キャンセル</button><button id="saveEdit" class="save-btn">保存する</button></div>
</div></div>


<div id="photoViewer" class="photo-viewer">
<button id="photoViewerClose" class="photo-viewer-close" type="button">×</button>
<img id="photoViewerImage" alt="タスク写真">
</div>
<div id="calendarModal" class="calendar-backdrop">
  <div class="calendar-box">
    <div class="calendar-head">
      <button id="calendarPrev" class="calendar-nav" type="button">‹</button>
      <div id="calendarTitle" class="calendar-title"></div>
      <button id="calendarNext" class="calendar-nav" type="button">›</button>
    </div>
    <div class="calendar-weekdays">
      <div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div><div>日</div>
    </div>
    <div id="calendarDays" class="calendar-days"></div>
    <div class="calendar-footer">
      <button id="calendarReset" class="calendar-reset" type="button">リセット</button>
      <button id="calendarOk" class="calendar-ok" type="button">決定</button>
    </div>
  </div>
</div>

<script>
const TK="taskToolTasksV14";
const RK="taskToolRepeatsV14";
const DK="taskToolDismissedV14";

const taskKeys=[
 TK,
 "taskToolTasksV5",
 "taskToolTasksV4",
 "taskToolTasksV3",
 "taskToolTasksV2",
 "tasks"
];
const repeatKeys=[
 RK,
 "taskToolRepeatsV5",
 "taskToolRepeatsV4",
 "taskToolRepeatsV3",
 "taskToolRepeatsV2",
 "repeats"
];
const dismissedKeys=[
 DK,
 "taskToolDismissedV5"
];

function safeArrayFromKey(key){
 const raw=localStorage.getItem(key);
 if(raw===null)return [];
 try{
  const parsed=JSON.parse(raw);
  return Array.isArray(parsed)?parsed:[];
 }catch(e){
  return [];
 }
}
function bestStoredArray(keys){
 let best=[];
 for(const key of keys){
  const value=safeArrayFromKey(key);
  if(value.length>best.length)best=value;
 }
 return best;
}


const recoveredFromOldKey =
 localStorage.getItem("taskToolTasksV14")===null &&
 taskKeys.slice(1).some(k=>safeArrayFromKey(k).length>0);

let tasks=bestStoredArray(taskKeys).map(t=>({
 ...t,
 id:t.id||crypto.randomUUID(),
 title:t.title||t.name||"",
 due:t.due||"",
 note:t.note||"",
 completed:!!t.completed,
 kind:t.kind||"normal"
}));

let repeats=bestStoredArray(repeatKeys).map(r=>({
 id:r.id||crypto.randomUUID(),
 title:r.title||"",
 type:r.type==="monthly"?"monthly":"weekly",
 note:r.note||"",
 weeklyDay:String(r.weeklyDay??r.weekday??1),
 monthlyMode:r.monthlyMode||"first_business"
}));

let dismissed=new Set(bestStoredArray(dismissedKeys));
let editingId=null;
const $=id=>document.getElementById(id),pad=n=>String(n).padStart(2,"0");
const dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parse=s=>{const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
const clone=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate());
const add=(d,n)=>{const x=clone(d);x.setDate(x.getDate()+n);return x};
const diff=(a,b)=>Math.floor((clone(a)-clone(b))/86400000);

const PHOTO_LIMIT=5,PHOTO_DB_NAME="taskToolPhotosV1",PHOTO_STORE="photos";
const REPEAT_PHOTO_DB_NAME="taskToolRepeatPhotosV1",REPEAT_PHOTO_STORE="repeatPhotos";
let addPendingPhotos=[],editExistingPhotos=[],editPendingPhotos=[],editRemovedPhotoIds=new Set();
let repeatPendingPhotos=[];

const repeatPhotoDbPromise=new Promise((resolve,reject)=>{
 const req=indexedDB.open(REPEAT_PHOTO_DB_NAME,1);
 req.onupgradeneeded=()=>{
  const db=req.result;
  const store=db.createObjectStore(REPEAT_PHOTO_STORE,{keyPath:"id"});
  store.createIndex("repeatId","repeatId",{unique:false});
 };
 req.onsuccess=()=>resolve(req.result);
 req.onerror=()=>reject(req.error);
});

const photoDbPromise=new Promise((resolve,reject)=>{const req=indexedDB.open(PHOTO_DB_NAME,1);req.onupgradeneeded=()=>{const db=req.result;const store=db.createObjectStore(PHOTO_STORE,{keyPath:"id"});store.createIndex("taskId","taskId",{unique:false})};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)});

async function getRepeatPhotos(repeatId){
 const db=await repeatPhotoDbPromise;
 return new Promise((resolve,reject)=>{
  const tx=db.transaction(REPEAT_PHOTO_STORE,"readonly");
  const req=tx.objectStore(REPEAT_PHOTO_STORE).index("repeatId").getAll(repeatId);
  req.onsuccess=()=>resolve(req.result.sort((a,b)=>a.createdAt-b.createdAt));
  req.onerror=()=>reject(req.error);
 });
}
async function storeRepeatPhoto(repeatId,data){
 const db=await repeatPhotoDbPromise;
 return new Promise((resolve,reject)=>{
  const tx=db.transaction(REPEAT_PHOTO_STORE,"readwrite");
  tx.objectStore(REPEAT_PHOTO_STORE).put({
   id:crypto.randomUUID(),repeatId,data,createdAt:Date.now()+Math.random()
  });
  tx.oncomplete=()=>resolve();
  tx.onerror=()=>reject(tx.error);
 });
}
async function removeRepeatPhoto(id){
 const db=await repeatPhotoDbPromise;
 return new Promise((resolve,reject)=>{
  const tx=db.transaction(REPEAT_PHOTO_STORE,"readwrite");
  tx.objectStore(REPEAT_PHOTO_STORE).delete(id);
  tx.oncomplete=()=>resolve();
  tx.onerror=()=>reject(tx.error);
 });
}
async function removeAllRepeatPhotos(repeatId){
 const photos=await getRepeatPhotos(repeatId);
 await Promise.all(photos.map(p=>removeRepeatPhoto(p.id)));
}
async function copyRepeatPhotosToTask(repeatId,taskId){
 const photos=await getRepeatPhotos(repeatId);
 for(const p of photos)await storePhoto(taskId,p.data);
}

async function getTaskPhotos(taskId){const db=await photoDbPromise;return new Promise((resolve,reject)=>{const tx=db.transaction(PHOTO_STORE,"readonly");const req=tx.objectStore(PHOTO_STORE).index("taskId").getAll(taskId);req.onsuccess=()=>resolve(req.result.sort((a,b)=>a.createdAt-b.createdAt));req.onerror=()=>reject(req.error)})}
async function storePhoto(taskId,data){const db=await photoDbPromise;return new Promise((resolve,reject)=>{const tx=db.transaction(PHOTO_STORE,"readwrite");tx.objectStore(PHOTO_STORE).put({id:crypto.randomUUID(),taskId,data,createdAt:Date.now()+Math.random()});tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}
async function removePhoto(id){const db=await photoDbPromise;return new Promise((resolve,reject)=>{const tx=db.transaction(PHOTO_STORE,"readwrite");tx.objectStore(PHOTO_STORE).delete(id);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}
async function removeAllTaskPhotos(taskId){const photos=await getTaskPhotos(taskId);await Promise.all(photos.map(p=>removePhoto(p.id)))}
function compressPhoto(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=()=>reject(reader.error);reader.onload=()=>{const img=new Image();img.onerror=()=>reject(new Error("画像を読み込めませんでした"));img.onload=()=>{const maxSide=1000,scale=Math.min(1,maxSide/Math.max(img.width,img.height)),canvas=document.createElement("canvas");canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);resolve(canvas.toDataURL("image/jpeg",0.74))};img.src=reader.result};reader.readAsDataURL(file)})}
async function filesToCompressed(files,remaining){const result=[];for(const file of [...files].slice(0,remaining)){if(file.type.startsWith("image/"))result.push(await compressPhoto(file))}return result}
function photoEditorItem(src,onRemove){const item=document.createElement("div");item.className="photo-editor-item";const img=document.createElement("img");img.src=src;const btn=document.createElement("button");btn.type="button";btn.className="photo-remove";btn.textContent="×";btn.onclick=onRemove;item.append(img,btn);return item}
function renderAddPhotoPreview(){const box=$("addPhotoPreview");box.innerHTML="";addPendingPhotos.forEach((src,i)=>box.appendChild(photoEditorItem(src,()=>{addPendingPhotos.splice(i,1);renderAddPhotoPreview()})));$("addPhotoBtn").disabled=addPendingPhotos.length>=PHOTO_LIMIT}

function renderRepeatPhotoPreview(){
 const box=$("repeatPhotoPreview");box.innerHTML="";
 repeatPendingPhotos.forEach((src,i)=>{
  box.appendChild(photoEditorItem(src,()=>{
   repeatPendingPhotos.splice(i,1);renderRepeatPhotoPreview();
  }));
 });
 $("repeatPhotoBtn").disabled=repeatPendingPhotos.length>=PHOTO_LIMIT;
}

function renderEditPhotoPreview(){const box=$("editPhotoPreview");box.innerHTML="";editExistingPhotos.forEach(p=>box.appendChild(photoEditorItem(p.data,()=>{editRemovedPhotoIds.add(p.id);editExistingPhotos=editExistingPhotos.filter(x=>x.id!==p.id);renderEditPhotoPreview()})));editPendingPhotos.forEach((src,i)=>box.appendChild(photoEditorItem(src,()=>{editPendingPhotos.splice(i,1);renderEditPhotoPreview()})));$("editPhotoBtn").disabled=(editExistingPhotos.length+editPendingPhotos.length)>=PHOTO_LIMIT}
function openPhotoViewer(src){$("photoViewerImage").src=src;$("photoViewer").classList.add("show")}
function closePhotoViewer(){$("photoViewer").classList.remove("show");$("photoViewerImage").src=""}
$("photoViewerClose").onclick=closePhotoViewer;$("photoViewer").onclick=e=>{if(e.target===$("photoViewer"))closePhotoViewer()};

function save(){
 localStorage.setItem(TK,JSON.stringify(tasks));
 localStorage.setItem(RK,JSON.stringify(repeats));
 localStorage.setItem(DK,JSON.stringify([...dismissed]));
}
function showTab(n){
 document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===n));
 document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id===n));
}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>showTab(b.dataset.tab));

function nthWeekday(y,m,w,n){const f=new Date(y,m,1),o=(w-f.getDay()+7)%7;return new Date(y,m,1+o+(n-1)*7)}
function spring(y){return Math.floor(20.8431+.242194*(y-1980)-Math.floor((y-1980)/4))}
function autumn(y){return Math.floor(23.2488+.242194*(y-1980)-Math.floor((y-1980)/4))}
function baseHolidays(y){
 const s=new Set(),A=(m,d)=>s.add(`${y}-${pad(m)}-${pad(d)}`);
 A(1,1);s.add(dateKey(nthWeekday(y,0,1,2)));A(2,11);if(y>=2020)A(2,23);
 A(3,spring(y));A(4,29);A(5,3);A(5,4);A(5,5);s.add(dateKey(nthWeekday(y,6,1,3)));
 if(y>=2016)A(8,11);s.add(dateKey(nthWeekday(y,8,1,3)));A(9,autumn(y));
 s.add(dateKey(nthWeekday(y,9,1,2)));A(11,3);A(11,23);if(y<=2018)A(12,23);
 return s;
}
const hc={};
function holidays(y){
 if(hc[y])return hc[y];const s=baseHolidays(y);
 [...s].sort().forEach(k=>{const d=parse(k);if(d.getDay()===0){let x=add(d,1);while(s.has(dateKey(x)))x=add(x,1);s.add(dateKey(x))}});
 for(let d=new Date(y,0,2),e=new Date(y,11,30);d<=e;d=add(d,1)){
  const k=dateKey(d);if(!s.has(k)&&s.has(dateKey(add(d,-1)))&&s.has(dateKey(add(d,1))))s.add(k);
 }
 return hc[y]=s;
}
function yearEnd(d){const m=d.getMonth()+1,n=d.getDate();return(m===12&&n>=29)||(m===1&&n<=3)}
function business(d){return ![0,6].includes(d.getDay())&&!yearEnd(d)&&!holidays(d.getFullYear()).has(dateKey(d))}
function nextBusiness(d){let x=clone(d);while(!business(x))x=add(x,1);return x}
function prevBusiness(d){let x=clone(d);while(!business(x))x=add(x,-1);return x}
function weekStart(d){const x=clone(d),z=x.getDay()===0?-6:1-x.getDay();return add(x,z)}

function targetFor(r,today){
 if(r.type==="weekly"){
  const monday=weekStart(today),weekday=Number(r.weeklyDay||1);
  return {target:nextBusiness(add(monday,weekday-1)),period:`W-${dateKey(monday)}`};
 }
 const y=today.getFullYear(),m=today.getMonth();let base;
 switch(r.monthlyMode){
  case"second_monday":base=nthWeekday(y,m,1,2);break;
  case"third_monday":base=nthWeekday(y,m,1,3);break;
  case"day15":base=new Date(y,m,15);break;
  case"last_business":base=prevBusiness(new Date(y,m+1,0));return{target:base,period:`M-${y}-${pad(m+1)}`};
  default:base=new Date(y,m,1);
 }
 return {target:nextBusiness(base),period:`M-${y}-${pad(m+1)}`};
}
function generate(){
 const today=clone(new Date());let changed=false;
 repeats.forEach(r=>{
  const {target,period}=targetFor(r,today),key=`${r.id}-${period}`;
  if(target<=today&&!dismissed.has(key)&&!tasks.some(t=>t.occurrenceKey===key)){
   const newTask={id:crypto.randomUUID(),title:r.title,due:dateKey(target),note:r.note||"",completed:false,kind:"recurring",repeatType:r.type,appearedAt:dateKey(target),occurrenceKey:key};
   tasks.push(newTask);
   copyRepeatPhotosToTask(r.id,newTask.id).catch(()=>{});
   changed=true;
  }
 });
 if(changed)save();
}
function taskColor(t){
 const today=clone(new Date());
 if(!t.due)return "green";
 const due=parse(t.due);
 const days=diff(due,today);
 if(days===0)return "red";
 if(days>=1&&days<=3)return "yellow";
 return "green";
}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}


$("addPhotoBtn").onclick=()=>$("addPhotoInput").click();
$("addPhotoInput").onchange=async e=>{const remaining=PHOTO_LIMIT-addPendingPhotos.length;if(remaining<=0)return;try{addPendingPhotos.push(...await filesToCompressed(e.target.files,remaining));renderAddPhotoPreview()}catch(err){alert("写真を読み込めませんでした")}e.target.value=""};

$("repeatPhotoBtn").onclick=()=>$("repeatPhotoInput").click();
$("repeatPhotoInput").onchange=async e=>{

 try{

async function openEdit(t){editingId=t.id;$("editTitle").value=t.title;$("editDue").value=t.due||"";$("editNote").value=t.note||"";editPendingPhotos=[];editRemovedPhotoIds=new Set();try{editExistingPhotos=await getTaskPhotos(t.id)}catch(e){editExistingPhotos=[]}renderEditPhotoPreview();$("editModal").classList.add("show")}
function closeEdit(){editingId=null;$("editModal").classList.remove("show")}
$("cancelEdit").onclick=closeEdit;
$("editModal").onclick=e=>{if(e.target===$("editModal"))closeEdit()};
$("saveEdit").onclick=async()=>{
 const t=tasks.find(x=>x.id===editingId);if(!t)return closeEdit();
 const title=$("editTitle").value.trim();if(!title)return alert("タスク名を入力してください");
 t.title=title;t.due=$("editDue").value;t.note=$("editNote").value.trim();
 try{await Promise.all([...editRemovedPhotoIds].map(id=>removePhoto(id)));for(const data of editPendingPhotos)await storePhoto(t.id,data)}catch(e){alert("写真の保存に失敗しました。Safariの空き容量を確認してください。")}save();closeEdit();renderTasks();
};

async function deleteTask(t){
 if(t.occurrenceKey)dismissed.add(t.occurrenceKey);
 tasks=tasks.filter(x=>x.id!==t.id);try{await removeAllTaskPhotos(t.id)}catch(e){}save();renderTasks();
}
function renderTasks(){
 generate();const list=$("taskList"),active=tasks.filter(t=>!t.completed);
 active.sort((a,b)=>{
  const order={red:0,yellow:1,green:2};
  const ac=taskColor(a),bc=taskColor(b);
  if(order[ac]!==order[bc])return order[ac]-order[bc];
  return(a.due?parse(a.due):Infinity)-(b.due?parse(b.due):Infinity);
 });
 if(!active.length){list.innerHTML='<div class="empty">未完了のタスクはありません</div>';return}
 list.innerHTML="";
 active.forEach(t=>{
  const w=document.createElement("div");w.className="task-wrap";w.innerHTML='<div class="delete-bg">削除</div>';
  const c=document.createElement("button");
  const color=taskColor(t);
  c.className=`task-card ${color}`;
  const badge=t.kind==="recurring"?`<span class="badge">${t.repeatType==="weekly"?"週例":"月例"}</span>`:"";
  const dueText=color==="red"?"":`<div class="task-meta">期限：${t.due||"未設定"}</div>`;
  c.innerHTML=`<div class="task-title">${esc(t.title)}${badge}<span class="photo-count" data-photo-count="${t.id}" style="display:none">📷 0</span></div>${dueText}
  <div class="detail">${t.kind==="recurring"?`<div>出現日：${t.appearedAt}</div>`:""}<div><strong>補足：</strong></div>
  <div class="task-note">${esc(t.note||"なし")}</div><div class="task-photo-area" data-photo-area="${t.id}"></div><div class="actions">
  <button class="small-btn complete" type="button">完了</button><button class="small-btn edit" type="button">編集</button></div></div>`;
  w.appendChild(c);list.appendChild(w);
  getTaskPhotos(t.id).then(photos=>{if(!photos.length)return;const count=c.querySelector(`[data-photo-count="${t.id}"]`);count.textContent=`📷 ${photos.length}`;count.style.display="inline-flex";const area=c.querySelector(`[data-photo-area="${t.id}"]`);const title=document.createElement("div");title.className="task-photos-title";title.textContent=`写真（${photos.length}枚）`;const grid=document.createElement("div");grid.className="task-photo-grid";photos.forEach(p=>{const item=document.createElement("div");item.className="task-photo-item";const img=document.createElement("img");img.src=p.data;img.onclick=e=>{e.stopPropagation();openPhotoViewer(p.data)};item.appendChild(img);grid.appendChild(item)});area.append(title,grid)}).catch(()=>{});
  let sx=0,sy=0,moved=false,swipeBlocked=false,swipeActive=false;
  c.ontouchstart=e=>{
   swipeBlocked=c.classList.contains("open");
   sx=e.touches[0].clientX;
   sy=e.touches[0].clientY;
   moved=false;
   swipeActive=false;
   if(swipeBlocked)c.style.transform="translateX(0)";
  };
  c.ontouchmove=e=>{
   if(swipeBlocked)return;
   const dx=e.touches[0].clientX-sx;
   const dy=e.touches[0].clientY-sy;

   if(!swipeActive){
    if(Math.abs(dy)>Math.abs(dx)){
     return;
    }
    if(dx>-45){
     return;
    }
    swipeActive=true;
   }

   if(dx<0){
    const adjusted=Math.max(dx+45,-96);
    c.style.transform=`translateX(${adjusted}px)`;
    moved=true;
    e.preventDefault();
   }
  };
  c.ontouchend=e=>{
   if(swipeBlocked){
    c.style.transform="translateX(0)";
    return;
   }
   const dx=e.changedTouches[0].clientX-sx;
   const dy=e.changedTouches[0].clientY-sy;
   const shouldOpen=swipeActive && Math.abs(dx)>75 && Math.abs(dx)>Math.abs(dy)*1.2;
   c.style.transform=shouldOpen?"translateX(-96px)":"translateX(0)";
   moved=shouldOpen;
  };
  c.onclick=e=>{if(!e.target.closest(".small-btn")){c.style.transform="translateX(0)";c.classList.toggle("open")}};
  w.querySelector(".delete-bg").onclick=()=>deleteTask(t);
  c.querySelector(".complete").onclick=e=>{e.stopPropagation();t.completed=true;save();renderTasks()};
  c.querySelector(".edit").onclick=e=>{e.stopPropagation();openEdit(t)};
 });
}
$("addTaskBtn").onclick=async()=>{
 const title=$("titleInput").value.trim();if(!title)return alert("タスク名を入力してください");
 const task={id:crypto.randomUUID(),title,due:$("dueInput").value,note:$("noteInput").value.trim(),completed:false,kind:"normal",createdAt:dateKey(new Date())};tasks.push(task);
 const taskPhotos=Array.isArray(addPendingPhotos)?[...addPendingPhotos]:[];
 if(taskPhotos.length){
  try{for(const data of taskPhotos)await storePhoto(task.id,data)}
  catch(e){
   console.error("通常タスク写真の保存エラー",e);
   alert("写真の保存に失敗しました。写真なしでタスクを登録しました。");
  }
 }save();$("titleInput").value=$("dueInput").value=$("noteInput").value="";addPendingPhotos=[];renderAddPhotoPreview();renderTasks();showTab("tasks");
};

$("repeatType").onchange=()=>{
 const weekly=$("repeatType").value==="weekly";
 $("weeklyRule").classList.toggle("hidden",!weekly);$("monthlyRule").classList.toggle("hidden",weekly);
};
$("addRepeatBtn").onclick=async()=>{
 const title=$("repeatTitle").value.trim();if(!title)return alert("タスク名を入力してください");
 const repeat={id:crypto.randomUUID(),title,type:$("repeatType").value,note:$("repeatNote").value.trim(),weeklyDay:$("weeklyDay").value,monthlyMode:$("monthlyMode").value};
 repeats.push(repeat);
 const photosToSave=Array.isArray(repeatPendingPhotos)?[...repeatPendingPhotos]:[];
 if(photosToSave.length){
  try{
   for(const data of photosToSave)await storeRepeatPhoto(repeat.id,data);
  }catch(e){
   console.error("週例・月例写真の保存エラー",e);
   alert("写真の保存に失敗しました。写真なしで週例・月例タスクを登録しました。");
  }
 }
 save();
 $("repeatTitle").value=$("repeatNote").value="";
 repeatPendingPhotos=[];renderRepeatPhotoPreview();
 renderRepeats();renderTasks();
};
const dayNames={"1":"月曜日","2":"火曜日","3":"水曜日","4":"木曜日","5":"金曜日"};
const modeNames={first_business:"毎月1日を基準",second_monday:"第2月曜日",third_monday:"第3月曜日",day15:"毎月15日",last_business:"月末営業日"};
function renderRepeats(){
 const box=$("repeatList");if(!repeats.length){box.innerHTML='<div class="empty">登録済みの週例・月例はありません</div>';return}
 box.innerHTML="";
 const monthlyOrder={first_business:0,second_monday:1,third_monday:2,day15:3,last_business:4};
 const sortedRepeats=[...repeats].sort((a,b)=>{
  if(a.type!==b.type)return a.type==="weekly"?-1:1;
  if(a.type==="weekly")return Number(a.weeklyDay||1)-Number(b.weeklyDay||1);
  return (monthlyOrder[a.monthlyMode]??0)-(monthlyOrder[b.monthlyMode]??0);
 });
 sortedRepeats.forEach(r=>{
  const d=document.createElement("div");d.className="repeat-item";
  const rule=r.type==="weekly"?`週例・${dayNames[r.weeklyDay]||"月曜日"}`:`月例・${modeNames[r.monthlyMode]||modeNames.first_business}`;
  d.innerHTML=`<div class="repeat-title">${esc(r.title)}<span class="photo-count" data-repeat-photo-count="${r.id}" style="display:none">📷 0</span></div><div class="repeat-meta">${rule}</div>${r.note?`<div class="repeat-note">${esc(r.note)}</div>`:""}
  <div class="repeat-actions"><button class="secondary">編集</button><button class="danger">削除</button></div>`;
  getRepeatPhotos(r.id).then(photos=>{
   if(!photos.length)return;
   const count=d.querySelector(`[data-repeat-photo-count="${r.id}"]`);
   count.textContent=`📷 ${photos.length}`;
   count.style.display="inline-flex";
  }).catch(()=>{});
  d.querySelector(".secondary").onclick=()=>{
   const title=prompt("タスク名",r.title);if(title===null||!title.trim())return;
   const note=prompt("補足説明",r.note||"");r.title=title.trim();if(note!==null)r.note=note.trim();save();renderRepeats();
  };
  d.querySelector(".danger").onclick=async()=>{
   repeats=repeats.filter(x=>x.id!==r.id);
   try{await removeAllRepeatPhotos(r.id)}catch(e){}
   save();renderRepeats()
  };
  box.appendChild(d);
 });
}

let calendarTarget=null;
let calendarView=new Date();
let calendarSelected="";

function openCalendar(input){
 calendarTarget=input;
 calendarSelected=input.value||"";
 calendarView=calendarSelected?parse(calendarSelected):new Date();
 calendarView=new Date(calendarView.getFullYear(),calendarView.getMonth(),1);
 renderCalendar();
 $("calendarModal").classList.add("show");
}
function closeCalendar(){
 $("calendarModal").classList.remove("show");
 calendarTarget=null;
}
function renderCalendar(){
 const y=calendarView.getFullYear(),m=calendarView.getMonth();
 $("calendarTitle").textContent=`${y}年${m+1}月`;
 const box=$("calendarDays");
 box.innerHTML="";
 const first=new Date(y,m,1);
 const mondayIndex=(first.getDay()+6)%7;
 const start=add(first,-mondayIndex);
 const today=dateKey(new Date());
 for(let i=0;i<42;i++){
  const d=add(start,i),key=dateKey(d);
  const b=document.createElement("button");
  b.type="button";
  b.className="calendar-day";
  b.textContent=d.getDate();
  if(d.getMonth()!==m)b.classList.add("other");
  if(key===today)b.classList.add("today");
  if(key===calendarSelected)b.classList.add("selected");
  b.onclick=()=>{calendarSelected=key;renderCalendar()};
  box.appendChild(b);
 }
}
document.querySelectorAll(".date-field").forEach(input=>{
 input.addEventListener("click",()=>openCalendar(input));
});
$("calendarPrev").onclick=()=>{
 calendarView=new Date(calendarView.getFullYear(),calendarView.getMonth()-1,1);
 renderCalendar();
};
$("calendarNext").onclick=()=>{
 calendarView=new Date(calendarView.getFullYear(),calendarView.getMonth()+1,1);
 renderCalendar();
};
$("calendarReset").onclick=()=>{
 if(calendarTarget)calendarTarget.value="";
 closeCalendar();
};
$("calendarOk").onclick=()=>{
 if(calendarTarget)calendarTarget.value=calendarSelected;
 closeCalendar();
};
$("calendarModal").addEventListener("click",e=>{
 if(e.target===$("calendarModal"))closeCalendar();
});

renderAddPhotoPreview();
renderRepeatPhotoPreview();
generate();
renderTasks();
renderRepeats();

if(recoveredFromOldKey && tasks.length){
 setTimeout(()=>alert(`保存されていたタスクを${tasks.length}件復旧しました。`),100);
}
// 復旧できたデータだけを新しいキーへ保存。旧キーは一切削除しない。
localStorage.setItem(TK,JSON.stringify(tasks));
localStorage.setItem(RK,JSON.stringify(repeats));
localStorage.setItem(DK,JSON.stringify([...dismissed]));
</script>
